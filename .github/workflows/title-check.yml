name: PR Title Check

on:
  pull_request_target:
    types: [opened, edited]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        run: |
          title="${{ github.event.pull_request.title }}"
          if [[ ! "$title" =~ ^(feat|fix|docs|chore): ]]; then
            echo "PR title must start with feat:, fix:, docs:, or chore:"
            exit 1
          fi
